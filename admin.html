<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Myanmar Rate Admin Database</title>
<style>
:root{--bg:#07090d;--card:#11151d;--line:#2b3139;--gold:#f0b90b;--text:#fff;--sub:#9aa4af;--green:#0ecb81;--red:#f6465d}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#1b2434,#07090d 45%);color:var(--text);font-family:Arial,sans-serif}.wrap{max-width:1100px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}.brand{font-size:28px;font-weight:1000;color:var(--gold)}.card{background:rgba(17,21,29,.95);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}label{display:block;color:var(--sub);font-size:12px;font-weight:800;margin-bottom:5px}input,textarea,select{width:100%;padding:12px;background:#080b10;color:#fff;border:1px solid var(--line);border-radius:10px}textarea{min-height:90px}button{padding:12px 16px;border:none;border-radius:10px;background:var(--gold);color:#000;font-weight:900;cursor:pointer}.ghost{background:#181a20;color:#fff;border:1px solid var(--line)}.red{background:var(--red);color:#fff}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:15px 0}.tab{background:#181a20;color:#fff;border:1px solid var(--line)}.tab.active{background:var(--gold);color:#000}.status{color:var(--sub);font-size:13px}.login{max-width:420px;margin:12vh auto}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#11151d;border:1px solid var(--line);padding:12px 18px;border-radius:99px;display:none}.toast.show{display:block}@media(max-width:760px){.grid,.grid2{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><div class="brand">Myanmar Rate Admin</div><div class="status" id="status">Database Admin Panel</div></div><a href="/" class="ghost" style="padding:12px 16px;border-radius:10px;text-decoration:none">Open Site</a></div>
  <div id="login" class="card login"><h2>Login</h2><label>Admin Password</label><input id="password" type="password" placeholder="123456"><button onclick="login()">Login</button></div>
  <div id="panel" style="display:none">
    <div class="tabs"><button class="tab active" onclick="tab('rates')">Rates</button><button class="tab" onclick="tab('content')">Content</button><button class="tab" onclick="tab('ads')">Ads</button><button class="tab" onclick="tab('contacts')">Contacts</button><button class="tab" onclick="tab('system')">System</button></div>
    <div class="card" id="form"></div>
    <button onclick="save()">Save To Database</button>
    <button class="ghost" onclick="loadFromApi()">Reload</button>
    <button class="ghost" onclick="exportData()">Export JSON</button>
    <button class="red" onclick="logout()">Logout</button>
  </div>
</div>
<div class="toast" id="toast">Saved</div>
<script>
let token=localStorage.getItem('mr_admin_token')||'';let data=null;let active='rates';
function toast(t){let x=document.getElementById('toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1800)}
function setStatus(t){document.getElementById('status').textContent=t}
async function login(){token=document.getElementById('password').value.trim();localStorage.setItem('mr_admin_token',token);await loadFromApi()}
function logout(){localStorage.removeItem('mr_admin_token');location.reload()}
async function loadFromApi(){try{setStatus('Loading database...');let res=await fetch('/api/admin',{headers:{Authorization:'Bearer '+token}});let j=await res.json();if(!j.ok)throw new Error(j.error||'Login failed');data=j.data;document.getElementById('login').style.display='none';document.getElementById('panel').style.display='block';setStatus('Connected: '+(j.source||'api'));render();toast('Loaded')}catch(e){setStatus('Error: '+e.message);toast('Login/API error')}}
function tab(t){active=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));[...document.querySelectorAll('.tab')].find(b=>b.textContent.toLowerCase().includes(t))?.classList.add('active');render()}
function input(id,label,val,type='text'){return `<div><label>${label}</label>${type==='textarea'?`<textarea id="${id}">${val||''}</textarea>`:`<input id="${id}" value="${val??''}" ${type==='number'?'type="number" step="0.01"':''}>`}</div>`}
function select(id,label,val){return `<div><label>${label}</label><select id="${id}"><option value="false">OFF</option><option value="true">ON</option></select></div>`}
function render(){let h='';if(active==='rates'){h='<div class="grid">';Object.entries(data.rates).forEach(([k,r])=>{h+=input('value_'+k,r.name+' Rate',r.value,'number')+input('change_'+k,r.name+' Change',r.change,'number')+input('spread_'+k,r.name+' Spread',r.spread,'number')+`<div><label>${r.name} Trend</label><select id="trend_${k}"><option value="up">up</option><option value="down">down</option></select></div>`});h+='</div>'}if(active==='content'){h='<div class="grid2">'+input('notice','Notice',data.notice,'textarea')+input('lang','Default Language',data.lang)+input('views','Views',data.views,'number')+'</div>'}if(active==='ads'){h='<div class="grid2">'+select('adEnabled','Top Ad',data.adEnabled)+select('sideAdEnabled','Side Ad',data.sideAdEnabled)+input('adTitle','Top Ad Title',data.adTitle)+input('adText','Top Ad Text',data.adText,'textarea')+input('sideAdTitle','Side Ad Title',data.sideAdTitle)+input('sideAdText','Side Ad Text',data.sideAdText,'textarea')+'</div>'}if(active==='contacts'){h='<div class="grid2">'+input('telegram','Telegram',data.telegram)+input('whatsapp','WhatsApp',data.whatsapp)+input('email','Email',data.email)+'</div>'}if(active==='system'){h='<div class="grid2">'+select('apiEnabled','API Enabled',data.apiEnabled)+input('apiUrl','API URL',data.apiUrl)+'</div>'}document.getElementById('form').innerHTML=h;Object.entries(data.rates||{}).forEach(([k,r])=>{let e=document.getElementById('trend_'+k);if(e)e.value=r.trend});['adEnabled','sideAdEnabled','apiEnabled'].forEach(id=>{let e=document.getElementById(id);if(e)e.value=String(!!data[id])})}
function collect(){Object.keys(data.rates).forEach(k=>{['value','change','spread'].forEach(f=>{let e=document.getElementById(f+'_'+k);if(e)data.rates[k][f]=parseFloat(e.value)||0});let tr=document.getElementById('trend_'+k);if(tr)data.rates[k].trend=tr.value});['notice','lang','views','adTitle','adText','sideAdTitle','sideAdText','telegram','whatsapp','email','apiUrl'].forEach(k=>{let e=document.getElementById(k);if(e)data[k]=k==='views'?parseInt(e.value)||0:e.value});['adEnabled','sideAdEnabled','apiEnabled'].forEach(k=>{let e=document.getElementById(k);if(e)data[k]=e.value==='true'})}
async function save(){try{collect();setStatus('Saving to database...');let res=await fetch('/api/admin',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify(data)});let j=await res.json();if(!j.ok)throw new Error(j.error||'Save failed');data=j.data;setStatus('Saved to database');toast('Saved to database')}catch(e){setStatus('Error: '+e.message);toast('Save error')}}
function exportData(){collect();navigator.clipboard.writeText(JSON.stringify(data,null,2));toast('Copied JSON')}
if(token){document.getElementById('password').value=token;loadFromApi()}
</script>
</body>
</html>
