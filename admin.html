<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Myanmar Rate Admin v6</title><script src='app.js'></script><style>body{background:#0b0e11;color:#fff;font-family:Arial;padding:20px}input,textarea,select{width:100%;padding:10px;margin:6px 0;background:#111;border:1px solid #333;color:#fff}button{padding:10px 15px;margin-top:10px;background:#f0b90b;border:none;font-weight:700}h2{margin-top:20px}</style></head><body><h1>Admin Panel</h1><div id='app'></div><script>let data=mrLoad();let html='';Object.entries(data.rates).forEach(([k,r])=>{html+=`<h2>${r.name}</h2><input id='rate_${k}' value='${r.value}'><input id='chg_${k}' value='${r.change}'><input id='spread_${k}' value='${r.spread}'>`});html+=`<h2>Notice</h2><textarea id='notice'>${data.notice}</textarea>`;html+=`<h2>Ads</h2><input id='adTitle' value='${data.adTitle}'><textarea id='adText'>${data.adText}</textarea>`;html+=`<h2>Contacts</h2><input id='tg' value='${data.telegram}'><input id='wa' value='${data.whatsapp}'><input id='email' value='${data.email}'>`;html+=`<button onclick='save()'>Save</button>`;document.getElementById('app').innerHTML=html;function save(){Object.keys(data.rates).forEach(k=>{data.rates[k].value=parseFloat(document.getElementById('rate_'+k).value);data.rates[k].change=parseFloat(document.getElementById('chg_'+k).value);data.rates[k].spread=parseFloat(document.getElementById('spread_'+k).value)});data.notice=document.getElementById('notice').value;data.adTitle=document.getElementById('adTitle').value;data.adText=document.getElementById('adText').value;data.telegram=document.getElementById('tg').value;data.whatsapp=document.getElementById('wa').value;data.email=document.getElementById('email').value;mrSave(data);alert('Saved');}</script></body></html>
