<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Myanmar Rate</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
header{padding:20px;font-size:28px;color:gold;font-weight:bold}
.box{background:#111;margin:15px;padding:20px;border-radius:14px}
.rate{font-size:35px;color:gold}
input,button{padding:12px;margin:8px;border-radius:10px;border:none}
button{background:gold;color:#000;font-weight:bold}
</style>
</head>
<body>

<header>Myanmar Rate</header>

<div class="box">
<h2>今日汇率</h2>
<div>RMB</div>
<div class="rate" id="rmb">610</div>
<div>USD</div>
<div class="rate" id="usd">4210</div>
<div>THB</div>
<div class="rate" id="thb">115</div>
</div>

<div class="box">
<h2>汇率换算</h2>
<input id="amount" placeholder="输入金额">
<select id="currency">
<option>RMB</option>
<option>USD</option>
<option>THB</option>
</select>
<button onclick="calc()">计算</button>
<h3 id="result">0 MMK</h3>
</div>

<div class="box">
<h2>公告</h2>
<div id="notice">Myanmar Rate 正式运行中</div>
</div>

<script>
const SUPABASE_URL="https://figxyzymfjdlmiqanucz.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_EVaUT__hVOvf3qNT_cdPNw_Tb8wfvLs";

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let rates={RMB:610,USD:4210,THB:115};

async function load(){
const {data}=await supabase.from("rates").select("*");
if(data){
data.forEach(i=>{
rates[i.currency]=i.value;
});
document.getElementById("rmb").innerText=rates.RMB;
document.getElementById("usd").innerText=rates.USD;
document.getElementById("thb").innerText=rates.THB;
}
}
load();

function calc(){
let a=parseFloat(document.getElementById("amount").value||0);
let c=document.getElementById("currency").value;
document.getElementById("result").innerText=(a*rates[c])+" MMK";
}
</script>

</body>
</html>
