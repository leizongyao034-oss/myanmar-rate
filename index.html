<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Myanmar Rate V2.0</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:#111;
border-bottom:1px solid #222;
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
color:#d4af37;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:15px;
font-size:14px;
cursor:pointer;
}

nav a:hover{
color:#d4af37;
}

.lang button{
margin-left:8px;
padding:6px 10px;
background:#111;
color:#d4af37;
border:1px solid #d4af37;
cursor:pointer;
border-radius:6px;
}

section{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

h1{
text-align:center;
font-size:42px;
color:#d4af37;
margin-bottom:15px;
}

p{
text-align:center;
color:#bbb;
margin-bottom:35px;
}

.card{
background:#141414;
padding:25px;
border-radius:12px;
border:1px solid #222;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#0d0d0d;
border:1px solid #333;
color:#fff;
border-radius:8px;
}

button.action{
width:100%;
padding:12px;
margin-top:12px;
background:#d4af37;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:8px;
color:#000;
}

.result{
margin-top:15px;
font-size:24px;
color:#d4af37;
font-weight:bold;
text-align:center;
}

.quick{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.box{
background:#141414;
padding:20px;
border-radius:12px;
text-align:center;
border:1px solid #222;
}

footer{
text-align:center;
padding:30px;
color:#666;
border-top:1px solid #222;
margin-top:40px;
}
</style>

<script>
let lang="zh";

function convert(){
let val=parseFloat(document.getElementById("rmb").value||0);
let result=val*610;
document.getElementById("result").innerHTML=result.toLocaleString()+" MMK";
}

function goTop(){
window.scrollTo({top:0,behavior:"smooth"});
}

function contact(){
window.location.href="mailto:your@email.com";
}

function setLang(type){
lang=type;

if(type==="zh"){
document.getElementById("title").innerHTML="实时汇率 · 精准计算 · 助力生意";
document.getElementById("desc").innerHTML="缅甸领先的智能汇率平台";
}

if(type==="en"){
document.getElementById("title").innerHTML="Live Rates · Smart Tools · Grow Business";
document.getElementById("desc").innerHTML="Myanmar Smart Exchange Platform";
}

if(type==="mm"){
document.getElementById("title").innerHTML="ငွေလဲနှုန်း တိုက်ရိုက် · စီးပွားရေးအကူအညီ";
document.getElementById("desc").innerHTML="မြန်မာနိုင်ငံ ငွေလဲပလက်ဖောင်း";
}
}
</script>

</head>

<body>

<header>
<div class="logo">🛕 Myanmar Rate</div>

<nav>
<a onclick="goTop()">Home</a>
<a onclick="goTop()">Rates</a>
<a onclick="goTop()">Tools</a>
<a onclick="contact()">Contact</a>
</nav>

<div class="lang">
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('mm')">မြန်မာ</button>
</div>
</header>

<section>

<h1 id="title">实时汇率 · 精准计算 · 助力生意</h1>
<p id="desc">缅甸领先的智能汇率平台</p>

<div class="quick">

<div class="box">
<h3>RMB</h3>
<p>610 MMK</p>
</div>

<div class="box">
<h3>USD</h3>
<p>4210 MMK</p>
</div>

<div class="box">
<h3>THB</h3>
<p>115 MMK</p>
</div>

</div>

<div class="card">
<h2>人民币换算器</h2>

<input type="number" id="rmb" placeholder="输入人民币金额">

<button class="action" onclick="convert()">立即换算</button>

<div class="result" id="result">0 MMK</div>
</div>

<div class="card">
<h2>商务合作</h2>
<button class="action" onclick="contact()">联系广告合作</button>
</div>

</section>

<footer>
© 2026 Myanmar Rate V2.0
</footer>

</body>
</html>
