<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Myanmar Rate V2.0 PRO</title>

<style>
:root{
--bg:#0f1115;
--card:#181b22;
--gold:#f0b90b;
--text:#ffffff;
--sub:#9aa4af;
--green:#0ecb81;
--red:#f6465d;
--line:#2a2f3a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

header{
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--line);
position:sticky;
top:0;
background:#0f1115ee;
backdrop-filter:blur(8px);
z-index:99;
}

.logo{
font-size:24px;
font-weight:900;
color:var(--gold);
}

.langs button{
background:var(--card);
color:#fff;
border:none;
padding:8px 12px;
margin-left:6px;
border-radius:8px;
cursor:pointer;
}

.hero{
padding:35px 20px;
text-align:center;
}

.hero h1{
font-size:34px;
margin-bottom:10px;
}

.hero p{
color:var(--sub);
font-size:15px;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

.card{
background:var(--card);
padding:18px;
border-radius:14px;
border:1px solid var(--line);
}

.pair{
font-size:15px;
color:var(--sub);
margin-bottom:10px;
}

.price{
font-size:34px;
font-weight:900;
margin-bottom:8px;
}

.up{color:var(--green);}
.down{color:var(--red);}

.chart{
height:80px;
margin-top:10px;
display:flex;
align-items:flex-end;
gap:5px;
}

.bar{
flex:1;
background:var(--gold);
border-radius:4px 4px 0 0;
}

.section-title{
font-size:22px;
font-weight:800;
margin:35px 0 15px;
}

.calc{
display:grid;
grid-template-columns:1fr 160px;
gap:10px;
}

.calc input,.calc select{
padding:14px;
border:none;
border-radius:10px;
background:#0f1115;
color:#fff;
font-size:18px;
border:1px solid var(--line);
}

.result{
margin-top:12px;
font-size:28px;
font-weight:900;
color:var(--gold);
}

footer{
margin-top:40px;
padding:30px;
text-align:center;
color:var(--sub);
font-size:13px;
border-top:1px solid var(--line);
}

#langModal{
position:fixed;
inset:0;
background:#000000c8;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.modalBox{
background:var(--card);
padding:25px;
border-radius:16px;
width:90%;
max-width:350px;
text-align:center;
}

.modalBox h2{
margin-bottom:18px;
}

.modalBox button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
background:var(--gold);
color:#000;
}

.admin{
position:fixed;
bottom:20px;
right:20px;
background:var(--gold);
color:#000;
padding:14px 16px;
border-radius:50%;
font-weight:900;
cursor:pointer;
}

@media(max-width:700px){
.calc{
grid-template-columns:1fr;
}
.hero h1{
font-size:28px;
}
}
</style>
</head>

<body>

<div id="langModal">
<div class="modalBox">
<h2>Select Language</h2>
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('mm')">မြန်မာ</button>
</div>
</div>

<header>
<div class="logo">Myanmar Rate</div>
<div class="langs">
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('mm')">MM</button>
</div>
</header>

<section class="hero">
<h1 id="title">Myanmar Exchange Rate</h1>
<p id="desc">Live Market Rates For Myanmar</p>
</section>

<div class="wrap">

<div class="section-title" id="marketText">Markets</div>

<div class="grid">

<div class="card">
<div class="pair">USD / MMK</div>
<div class="price up" id="usd">4,210</div>
<div>+1.2%</div>
<div class="chart">
<div class="bar" style="height:30%"></div>
<div class="bar" style="height:55%"></div>
<div class="bar" style="height:70%"></div>
<div class="bar" style="height:50%"></div>
<div class="bar" style="height:85%"></div>
</div>
</div>

<div class="card">
<div class="pair">RMB / MMK</div>
<div class="price up" id="rmb">610</div>
<div>+0.6%</div>
<div class="chart">
<div class="bar" style="height:20%"></div>
<div class="bar" style="height:35%"></div>
<div class="bar" style="height:55%"></div>
<div class="bar" style="height:65%"></div>
<div class="bar" style="height:75%"></div>
</div>
</div>

<div class="card">
<div class="pair">THB / MMK</div>
<div class="price down" id="thb">115</div>
<div>-0.3%</div>
<div class="chart">
<div class="bar" style="height:80%"></div>
<div class="bar" style="height:60%"></div>
<div class="bar" style="height:55%"></div>
<div class="bar" style="height:45%"></div>
<div class="bar" style="height:35%"></div>
</div>
</div>

</div>

<div class="section-title" id="calcText">Calculator</div>

<div class="card">
<div class="calc">
<input type="number" id="amount" placeholder="Enter Amount" oninput="calc()">
<select id="currency" onchange="calc()">
<option value="usd">USD</option>
<option value="rmb">RMB</option>
<option value="thb">THB</option>
</select>
</div>

<div class="result" id="result">0 MMK</div>
</div>

</div>

<div class="admin" onclick="adminLogin()">⚙</div>

<footer>
© 2026 Myanmar Rate V2.0 PRO
</footer>

<script>
const rates={
usd:4210,
rmb:610,
thb:115
};

function calc(){
let a=parseFloat(document.getElementById("amount").value)||0;
let c=document.getElementById("currency").value;
document.getElementById("result").innerText=
(a*rates[c]).toLocaleString()+" MMK";
}

function setLang(lang){
document.getElementById("langModal").style.display="none";

if(lang==="zh"){
title.innerText="缅甸实时汇率";
desc.innerText="专业缅甸市场汇率平台";
marketText.innerText="市场行情";
calcText.innerText="汇率计算器";
}

if(lang==="en"){
title.innerText="Myanmar Exchange Rate";
desc.innerText="Live Market Rates For Myanmar";
marketText.innerText="Markets";
calcText.innerText="Calculator";
}

if(lang==="mm"){
title.innerText="မြန်မာ ငွေလဲနှုန်း";
desc.innerText="တိုက်ရိုက်စျေးကွက်နှုန်းထား";
marketText.innerText="စျေးကွက်";
calcText.innerText="တွက်စက်";
}
}

function adminLogin(){
let p=prompt("Enter Admin Password");
if(p==="123456"){
let usd=prompt("USD Rate",rates.usd);
let rmb=prompt("RMB Rate",rates.rmb);
let thb=prompt("THB Rate",rates.thb);

rates.usd=parseFloat(usd);
rates.rmb=parseFloat(rmb);
rates.thb=parseFloat(thb);

document.getElementById("usd").innerText=rates.usd.toLocaleString();
document.getElementById("rmb").innerText=rates.rmb.toLocaleString();
document.getElementById("thb").innerText=rates.thb.toLocaleString();

alert("Updated Successfully");
}else{
alert("Wrong Password");
}
}

setInterval(()=>{
rates.usd+=Math.floor(Math.random()*5)-2;
rates.rmb+=Math.floor(Math.random()*3)-1;
rates.thb+=Math.floor(Math.random()*3)-1;

document.getElementById("usd").innerText=rates.usd.toLocaleString();
document.getElementById("rmb").innerText=rates.rmb.toLocaleString();
document.getElementById("thb").innerText=rates.thb.toLocaleString();
},5000);
</script>

</body>
</html>
