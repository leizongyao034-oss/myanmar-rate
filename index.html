<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Myanmar Rate</title>
<style>
body{margin:0;background:#07090d;color:#fff;font-family:Arial}
.wrap{max-width:900px;margin:auto;padding:20px}
.card{background:#181a20;padding:20px;border-radius:14px;margin:10px 0}
.price{font-size:34px;font-weight:900}
</style>
</head>
<body>
<div class="wrap">
<h1>Myanmar Rate</h1>
<div id="rates"></div>
</div>

<script>
const PAIRS=['usd','thb','rmb'];

async function load(){
let r=await fetch('/api/rates');
let j=await r.json();
let html='';
PAIRS.forEach(k=>{
let v=j.rates[k];
if(v){
html+=`<div class="card">
<b>${v.name}/MMK</b>
<div class="price">${v.value}</div>
</div>`;
}
});
document.getElementById('rates').innerHTML=html;
}
load();
</script>
</body>
</html>
