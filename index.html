<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Myanmar Rate v2.0 PRO</title>
<meta name="description" content="Myanmar live exchange rates USD RMB THB">
<style>
:root{
--bg:#0b0e11;
--card:#181a20;
--gold:#f0b90b;
--text:#fff;
--sub:#9aa4af;
--green:#0ecb81;
--red:#f6465d;
--line:#2b3139;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:var(--bg);color:var(--text)}
header{
display:flex;justify-content:space-between;align-items:center;
padding:18px 20px;border-bottom:1px solid var(--line);
position:sticky;top:0;background:#0b0e11ee;backdrop-filter:blur(8px);z-index:99;
}
.logo{font-size:26px;font-weight:900;color:var(--gold)}
.lang button{
margin-left:6px;padding:8px 12px;border:none;border-radius:8px;
background:var(--card);color:#fff;cursor:pointer
}
.hero{text-align:center;padding:40px 20px}
.hero h1{font-size:36px;margin-bottom:10px}
.hero p{color:var(--sub)}
.wrap{max-width:1100px;margin:auto;padding:20px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:16px;
}
.card{
background:var(--card);
border:1px solid var(--line);
padding:18px;
border-radius:16px;
}
.pair{color:var(--sub);margin-bottom:10px}
.price{font-size:34px;font-weight:900}
.up{color:var(--green)}
.down{color:var(--red)}
.change{margin-top:8px;font-size:14px}
.chart{
height:70px;display:flex;align-items:flex-end;gap:5px;margin-top:15px
}
.bar{flex:1;background:var(--gold);border-radius:4px 4px 0 0}
.title{
font-size:24px;font-weight:800;margin:35px 0 16px
}
.calcBox{
background:var(--card);
border:1px solid var(--line);
padding:20px;border-radius:16px;
}
.row{
display:grid;grid-template-columns:1fr 160px;gap:10px
}
input,select{
padding:14px;background:#0b0e11;color:#fff;border:1px solid var(--line);
border-radius:10px;font-size:18px;width:100%;
}
.result{
margin-top:16px;font-size:30px;font-weight:900;color:var(--gold)
}
.admin{
position:fixed;right:18px;bottom:18px;
background:var(--gold);color:#000;font-weight:900;
width:54px;height:54px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
cursor:pointer;font-size:24px;
}
#langModal{
position:fixed;inset:0;background:#000000c8;
display:flex;justify-content:center;align-items:center;z-index:999;
}
.modal{
background:var(--card);padding:25px;border-radius:18px;
width:90%;max-width:340px;text-align:center;
}
.modal h2{margin-bottom:16px}
.modal button{
width:100%;padding:14px;margin-top:10px;border:none;
border-radius:10px;background:var(--gold);font-weight:800;cursor:pointer
}
footer{
text-align:center;color:var(--sub);
padding:30px;margin-top:40px;border-top:1px solid var(--line)
}
@media(max-width:700px){
.hero h1{font-size:28px}
.row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="langModal">
<div class="modal">
<h2>Select Language</h2>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('mm')">မြန်မာ</button>
</div>
</div>

<header>
<div class="logo">Myanmar Rate</div>
<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('mm')">MM</button>
</div>
</header>

<section class="hero">
<h1 id="heroTitle">Myanmar Live Exchange Rates</h1>
<p id="heroDesc">Premium Market Rates for Myanmar Traders</p>
</section>

<div class="wrap">

<div class="title" id="marketText">Markets</div>

<div class="grid">

<div class="card">
<div class="pair">USD / MMK</div>
<div class="price up" id="usd">4,210</div>
<div class="change">+1.2%</div>
<div class="chart">
<div class="bar" style="height:25%"></div>
<div class="bar" style="height:40%"></div>
<div class="bar" style="height:50%"></div>
<div class="bar" style="height:65%"></div>
<div class="bar" style="height:80%"></div>
</div>
</div>

<div class="card">
<div class="pair">RMB / MMK</div>
<div class="price up" id="rmb">610</div>
<div class="change">+0.4%</div>
<div class="chart">
<div class="bar" style="height:20%"></div>
<div class="bar" style="height:30%"></div>
<div class="bar" style="height:45%"></div>
<div class="bar" style="height:55%"></div>
<div class="bar" style="height:65%"></div>
</div>
</div>

<div class="card">
<div class="pair">THB / MMK</div>
<div class="price down" id="thb">115</div>
<div class="change">-0.3%</div>
<div class="chart">
<div class="bar" style="height:80%"></div>
<div class="bar" style="height:70%"></div>
<div class="bar" style="height:60%"></div>
<div class="bar" style="height:45%"></div>
<div class="bar" style="height:30%"></div>
</div>
</div>

</div>

<div class="title" id="calcText">Calculator</div>

<div class="calcBox">
<div class="row">
<input id="amount" type="number" placeholder="Enter Amount" oninput="calc()">
<select id="currency" onchange="calc()">
<option value="usd">USD</option>
<option value="rmb">RMB</option>
<option value="thb">THB</option>
</select>
</div>
<div class="result" id="result">0 MMK</div>
</div>

</div>

<div class="admin" onclick="admin()">⚙</div>

<footer>© 2026 Myanmar Rate v2.0 PRO</footer>

<script>
let rates={usd:4210,rmb:610,thb:115};

function calc(){
let a=parseFloat(document.getElementById("amount").value)||0;
let c=document.getElementById("currency").value;
document.getElementById("result").innerText=(a*rates[c]).toLocaleString()+" MMK";
}

function setLang(l){
document.getElementById("langModal").style.display="none";

if(l==="en"){
heroTitle.innerText="Myanmar Live Exchange Rates";
heroDesc.innerText="Premium Market Rates for Myanmar Traders";
marketText.innerText="Markets";
calcText.innerText="Calculator";
}
if(l==="zh"){
heroTitle.innerText="缅甸实时汇率";
heroDesc.innerText="专业缅甸市场交易汇率平台";
marketText.innerText="市场行情";
calcText.innerText="汇率计算器";
}
if(l==="mm"){
heroTitle.innerText="မြန်မာ တိုက်ရိုက် ငွေလဲနှုန်း";
heroDesc.innerText="ပရော်ဖက်ရှင်နယ် စျေးကွက်နှုန်းထား";
marketText.innerText="စျေးကွက်";
calcText.innerText="တွက်စက်";
}
}

function admin(){
let p=prompt("Password");
if(p==="123456"){
rates.usd=parseFloat(prompt("USD",rates.usd));
rates.rmb=parseFloat(prompt("RMB",rates.rmb));
rates.thb=parseFloat(prompt("THB",rates.thb));

usd.innerText=rates.usd.toLocaleString();
rmb.innerText=rates.rmb.toLocaleString();
thb.innerText=rates.thb.toLocaleString();

alert("Updated");
}else{
alert("Wrong Password");
}
}

setInterval(()=>{
rates.usd+=Math.floor(Math.random()*5)-2;
rates.rmb+=Math.floor(Math.random()*3)-1;
rates.thb+=Math.floor(Math.random()*3)-1;

usd.innerText=rates.usd.toLocaleString();
rmb.innerText=rates.rmb.toLocaleString();
thb.innerText=rates.thb.toLocaleString();
},5000);
</script>

</body>
</html>
