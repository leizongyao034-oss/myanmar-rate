<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Myanmar Rate V1.1</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:#111;
border-bottom:1px solid #222;
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
color:#d4af37;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:15px;
font-size:14px;
}

.lang button{
margin-left:8px;
padding:6px 10px;
background:#111;
color:#d4af37;
border:1px solid #d4af37;
cursor:pointer;
}

.hero{
text-align:center;
padding:80px 20px;
background:linear-gradient(180deg,#111,#0b0b0b);
}

.hero h1{
font-size:42px;
color:#d4af37;
margin-bottom:15px;
}

.hero p{
color:#bbb;
font-size:18px;
max-width:700px;
margin:auto;
line-height:1.6;
}

.section{
max-width:1100px;
margin:auto;
padding:55px 20px;
}

.title{
text-align:center;
font-size:30px;
color:#d4af37;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#141414;
padding:25px;
border-radius:12px;
border:1px solid #222;
text-align:center;
}

.card h3{
margin-bottom:12px;
color:#d4af37;
}

.rate{
font-size:34px;
font-weight:bold;
}

.green{color:#00d26a;}
.red{color:#ff5b5b;}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#0d0d0d;
border:1px solid #333;
color:#fff;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#d4af37;
border:none;
color:#000;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

.result{
margin-top:15px;
font-size:22px;
color:#d4af37;
font-weight:bold;
}

.contact a{
display:block;
background:#141414;
padding:14px;
margin-top:10px;
text-decoration:none;
color:#fff;
border:1px solid #333;
border-radius:8px;
}

footer{
text-align:center;
padding:35px;
color:#666;
border-top:1px solid #222;
margin-top:50px;
}
</style>

<script>
function convertRMB(){
let rmb=document.getElementById("rmb").value;
let result=rmb*610;
document.getElementById("output").innerHTML=result.toLocaleString()+" MMK";
}
</script>

</head>
<body>

<header>
<div class="logo">🛕 Myanmar Rate</div>

<nav>
<a href="#">Home</a>
<a href="#">Rates</a>
<a href="#">Tools</a>
<a href="#">Ads</a>
<a href="#">Contact</a>
</nav>

<div class="lang">
<button>中文</button>
<button>EN</button>
<button>မြန်မာ</button>
</div>
</header>

<section class="hero">
<h1>实时汇率 · 精准计算 · 助力生意</h1>
<p>
缅甸领先汇率与贸易平台，帮助商人掌握市场机会。
</p>
</section>

<section class="section">
<h2 class="title">今日汇率</h2>

<div class="grid">

<div class="card">
<h3>人民币 RMB</h3>
<div class="rate">610</div>
<p class="green">▲ +5</p>
</div>

<div class="card">
<h3>美元 USD</h3>
<div class="rate">4210</div>
<p class="red">▼ -12</p>
</div>

<div class="card">
<h3>泰铢 THB</h3>
<div class="rate">115</div>
<p class="green">▲ +1</p>
</div>

</div>
</section>

<section class="section">
<h2 class="title">人民币换算器</h2>

<div class="card">
<input type="number" id="rmb" placeholder="输入人民币金额">
<button onclick="convertRMB()">立即换算</button>
<div class="result" id="output">0 MMK</div>
</div>
</section>

<section class="section">
<h2 class="title">黄金广告位</h2>

<div class="grid">

<div class="card">
<h3>汇款公司</h3>
<p>中国 → 缅甸 快速到账</p>
</div>

<div class="card">
<h3>物流公司</h3>
<p>昆明直达曼德勒</p>
</div>

<div class="card">
<h3>手机批发</h3>
<p>全缅最低价供应</p>
</div>

</div>
</section>

<section class="section">
<h2 class="title">联系我们投广告</h2>

<div class="contact">
<a href="#">Telegram 联系</a>
<a href="#">Facebook 联系</a>
<a href="#">WhatsApp 联系</a>
</div>
</section>

<footer>
© 2026 Myanmar Rate V1.1
</footer>

</body>
</html>
